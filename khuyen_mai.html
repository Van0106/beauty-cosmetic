<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title> SẢN PHẨM KHUYẾN MÃI </title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="khuyen_mai.css">

    <!-- Boxicons (footer) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

<div id="header"></div>


<!-- BANNER -->

<section class="promo-banner">

<img
src="images/banner khuyến mại.png"
alt="Khuyến mãi">

</section>


<section class="product-layout">

<div class="products">


<!-- TOOLBAR -->

<div class="toolbar">

<h2>

SẢN PHẨM KHUYẾN MÃI

</h2>

<select
class="sort"
onchange="sortProducts()">

    <option>Mới nhất</option>

    <option>Giảm giá nhiều nhất</option>

    <option>Giá thấp đến cao</option>

    <option>Giá cao đến thấp</option>

</select>

</div>


<!-- GRID -->

<div class="grid" id="promoGrid"></div>

<!-- PAGINATION -->

<div class="pagination"></div>

</section>
</div>

<div id="footer"></div>

<script src="style.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => loadLayout());
</script>
<script src="san_pham.js"></script>
<script src="khuyen_mai.js"></script>

</body>

</html>
