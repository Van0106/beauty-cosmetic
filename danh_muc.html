<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>
Danh mục sản phẩm
</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="danh_muc.css">

    <!-- Boxicons (footer) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

</head>

<body>

<div id="header"></div>
<!-- BANNER -->

<section class="promo-banner">

<img
src="images/banner danh mục.png"
alt="Danh mục">

</section>

<div class="products">
<div class="product-layout">

<!-- SIDEBAR -->

<aside class="sidebar">

<h3>DANH MỤC</h3>

<div class="filter">

<label>
<input class="category" value="chamsocda" type="checkbox">
Chăm sóc da
</label>

<label>
<input class="category" value="trangdiem" type="checkbox">
Trang điểm
</label>

<label>
<input class="category" value="chongnang" type="checkbox">
Chống nắng
</label>

<label>
<input class="category" value="chamsoctoc" type="checkbox">
Chăm sóc tóc
</label>

</div>

<h3>THƯƠNG HIỆU</h3>

<div class="filter filter-brand" id="brandFilter">

<label><input class="brand" type="checkbox" value="clio"> Clio</label>

<label><input class="brand" type="checkbox" value="laneige"> Laneige</label>

<label><input class="brand" type="checkbox" value="la roche-posay"> La Roche-Posay</label>

<label><input class="brand" type="checkbox" value="some by mi"> Some By Mi</label>

<label><input class="brand" type="checkbox" value="the ordinary"> The Ordinary</label>

<label><input class="brand" type="checkbox" value="l'oréal paris"> L'Oréal Paris</label>

<label><input class="brand" type="checkbox" value="dove"> Dove</label>

<label><input class="brand" type="checkbox" value="tsubaki"> Tsubaki</label>

<label><input class="brand" type="checkbox" value="clinique"> Clinique</label>

<label><input class="brand" type="checkbox" value="the saem"> The Saem</label>

<label><input class="brand" type="checkbox" value="anessa"> Anessa</label>

<label><input class="brand" type="checkbox" value="bioderma"> Bioderma</label>

<label><input class="brand" type="checkbox" value="biore"> Biore</label>

<label><input class="brand" type="checkbox" value="innisfree"> Innisfree</label>

<label><input class="brand" type="checkbox" value="skin aqua"> Skin Aqua</label>

<label><input class="brand" type="checkbox" value="kiehl's"> Kiehl's</label>

<label><input class="brand" type="checkbox" value="vichy"> Vichy</label>

<label><input class="brand" type="checkbox" value="dior"> Dior</label>

<label><input class="brand" type="checkbox" value="rom&nd"> Rom&nd</label>

<label><input class="brand" type="checkbox" value="peripera"> Peripera</label>

<label><input class="brand" type="checkbox" value="cocoon"> Cocoon</label>

<label><input class="brand" type="checkbox" value="moroccanoil"> Moroccanoil</label>

</div>

<h3>KHOẢNG GIÁ</h3>

<div class="filter">

<label>

<input
name="price"
value="200"
type="radio">

Dưới 200K

</label>

<label>

<input
name="price"
value="500"
type="radio">

200–500K

</label>

<label>

<input
name="price"
value="9999"
type="radio">

Trên 500K

</label>

</div>

<button
class="btn"

onclick="filterProducts()">

LỌC

</button>

</aside>

<!-- PRODUCT -->

<section class="products">

<div class="toolbar">

<p class="product-count"></p>

<select
class="sort"

onchange="sortProducts()">

<option>

Mới nhất

</option>

<option>

Giá từ thấp đến cao

</option>

<option>

Giá từ cao đến thấp

</option>

</select>

</div>

<div
class="grid"

id="productGrid">

</div>

<!-- PAGINATION -->

<div class="pagination"></div>

</section>
</div>

<div id="footer"></div>
<script src="style.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => loadLayout());
</script>
<script src="san_pham.js"></script>
<script src="danh_muc.js"></script>
</body>

</html>
