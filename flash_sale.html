<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title> FLASH SALE </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="flash_sale.css">
    <link rel="stylesheet" href="style.css">

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <div id="header"></div>

<section class="flash-page">
    <div class="container">
        <div class="flash-top">
            <div class="flash-title">
                <h1>FLASH SALE</h1>
                <p>Siêu ưu đãi giới hạn thời gian</p>
            </div>

            <div class="countdown-wrap">
                <div id="flash-status" class="countdown-text">
                    KẾT THÚC TRONG
                </div>
                <div class="countdown">
                    <div class="time-box">
                        <span id="hours">00</span>
                        <small>Giờ</small>
                    </div>

                    <div class="time-box">
                        <span id="minutes">00</span>
                        <small>Phút</small>
                    </div>

                    <div class="time-box">
                        <span id="seconds">00</span>
                        <small>Giây</small>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="flash-banner"></div>

        <div class="flash-time-list">
            <div class="flash-time active">
                <h3>02:00</h3>
                <p>Sắp diễn ra</p>
            </div>

            <div class="flash-time">
                <h3>09:00</h3>
                <p>Sắp diễn ra</p>
            </div>

            <div class="flash-time">
                <h3>12:00</h3>
                <p>Sắp diễn ra</p>
            </div>

            <div class="flash-time">
                <h3>15:00</h3>
                <p>Sắp diễn ra</p>
            </div>

            <div class="flash-time">
                <h3>17:00</h3>
                <p>Sắp diễn ra</p>
            </div>
        </div>  

        <div class="product-grid" id="danh-sach-flash-sale">
            </div>

    </div>
</section>

<div id="footer"></div>

<script src="san_pham.js"></script>

<script src="flash_sale.js"></script>

<script src="style.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => loadLayout());
</script>
<script src="style.js"></script>

</body>
</html>
