<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #fff; overflow: visible; }
        
    </style>

<body>

<header class="header">
    <div class="container header-top">
        <div class="logo">

            <a href="yeu_thich.html" title="Yêu thích" target="_parent"><i class="fa-regular fa-heart" aria-hidden="true"></i></a>
            <a href="gio_hang.html" title="Giỏ hàng" target="_parent" class="cart-icon">
                <i class="fa-solid fa-bag-shopping" aria-hidden="true"></i>

        </div>
    </div>

    <nav class="navbar">
        <div class="container nav-menu">
            <a href="trang_chu.html" target="_parent">TRANG CHỦ</a>
            <a href="danh_muc.html" target="_parent">DANH MỤC</a>
            <a href="khuyen_mai.html" target="_parent">KHUYẾN MÃI</a>

    </nav>

</body>
</html>
