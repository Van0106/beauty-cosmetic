<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title> LIÊN HỆ </title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lien_he.css">

    <!-- Boxicons (footer) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Bootstrap -->
    
</head>
<body>

    <div id="header"></div>

<!-- CONTACT -->
<section class="contact-page">
    <div class="container">


        <!-- LEFT -->
        <div class="contact-left">


            <h2>LIÊN HỆ VỚI CHÚNG TÔI</h2>


            <form class="contact-form">
                <input type="text" placeholder="Họ và tên">
                <input type="email" placeholder="Email">
                <input type="text" placeholder="Số điện thoại">


                <textarea placeholder="Nội dung"></textarea>


                <button type="submit" class="btn-order">Gửi ngay</button>
            </form>


        </div>


        <!-- RIGHT -->
        <div class="contact-right">


            <h3>THÔNG TIN LIÊN HỆ</h3>


            <div class="contact-info">
                <p>
                    <i class="fa-solid fa-location-dot"></i>
                    12 Chùa Bộc, Quang Trung Đống Đa, Hà Nội
                </p>


                <p>
                    <i class="fa-solid fa-phone"></i>
                    1900 2631
                </p>


                <p>
                    <i class="fa-solid fa-envelope"></i>
                    beautycosmeticbeauty@gmail.com
                </p>


                <p>
                    <i class="fa-solid fa-globe"></i>
                    www.yourweb.com
                </p>
            </div>


            <div class="contact-social">
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            </div>

            <iframe 
                src="https://maps.google.com/maps?q=21.013250,105.826316&z=16&output=embed" 
                width="100%" 
                height="220" 
                style="border:0; border-radius: 18px;" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>

        </div>


    </div>
</section>

<div id="footer"></div>


<script src="lien_he.js"></script>
<script src="style.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => loadLayout());
</script>

</body>
</html>
