<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Beauty Cosmetic Beauty</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chi_tiet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <div id="header"></div>

    <div class="product-detail">
        <div class="product-gallery">
            <input type="radio" name="img" id="img1" checked>
            <input type="radio" name="img" id="img2">
            <input type="radio" name="img" id="img3">
            <input type="radio" name="img" id="img4">
            <input type="radio" name="img" id="img5">

            <div class="main-image">
                <img id="product-image" src="" alt="" class="pic1">
                <img src="" alt="" class="pic2">
                <img src="" alt="" class="pic3">
                <img src="" alt="" class="pic4">
                <img src="" alt="" class="pic5">
            </div>

            <div class="thumbnail-row">
                <label for="img1"><img src="" alt="Ảnh 1"></label>
                <label for="img2"><img src="" alt="Ảnh 2"></label>
                <label for="img3"><img src="" alt="Ảnh 3"></label>
                <label for="img4"><img src="" alt="Ảnh 4"></label>
                <label for="img5"><img src="" alt="Ảnh 5"></label>
            </div>
        </div>

        <div class="product-info">
            <h1 id="product-name" class="product-title"></h1>

            <div class="rating">
                <div class="stars">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                </div>
                <span class="review">(0 đánh giá)</span>
                <span class="line">|</span>
                <span>Chưa có hỏi đáp</span>
                <span class="line">|</span>
                <span id="product-sold"></span>
            </div>

            <div class="freeship">FREESHIP TOÀN QUỐC</div>

            <div class="price-box detail-price">
                <span id="product-price" class="new-price"></span>
                <span id="product-old-price" class="old-price"></span>
                <span id="product-sale-badge" class="sale"></span>
                <span class="gift">GIFT</span>
            </div>

             <p>Mã giảm giá:</p>

            <div class="voucher">
                <span>Giảm 15%</span>
                <span>Giảm 10%</span>
                <span>Freeship</span>
            </div>

            <p>Số lượng</p>

            <div class="quantity">
                <button type="button" id="btn-decrease">-</button>
                <input type="text" id="quantity-input" value="1" readonly>
                <button type="button" id="btn-increase">+</button>
            </div>

            <div class="buttons">
                <button type="button" class="add-cart">Thêm vào giỏ</button>
                <button type="button" class="add-favorite" onclick="addToFavorite()">
                    <i class="fa-regular fa-heart"></i> Yêu thích
                </button>
            </div>
        </div>
    </div>

    <div class="product-bottom-container">
        <div class="product-tabs">
            <div class="tab-item active" data-tab="mota">Mô tả</div>
            <div class="tab-item" data-tab="thongso">Thông số</div>
            <div class="tab-item" data-tab="thanhphan">Thành phần</div>
            <div class="tab-item" data-tab="hdsd">HDSD</div>
            <div class="tab-item" data-tab="danhgia">Đánh giá</div>
        </div>

        <div class="tab-content" id="tab-mota"></div>

        <div class="tab-content" id="tab-thongso" style="display:none"></div>

        <div class="tab-content" id="tab-thanhphan" style="display:none"></div>

        <div class="tab-content" id="tab-hdsd" style="display:none"></div>
        
        <div class="tab-content" id="tab-danhgia" style="display:none">
            <p>Chưa có đánh giá nào cho sản phẩm này.</p>
        </div>

    </div>

    <div id="footer"></div>

<script src="style.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => loadLayout());
</script>
    <script src="san_pham.js"></script>
    <script src="js/chitietsanpham.js"></script>
    <script src="js/favorite.js"></script>
</body>
</html>
