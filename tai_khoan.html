<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - Beauty Cosmetic Beauty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tai_khoan.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <div id="header"></div>

    <section class="auth-page">
        <div class="container auth-layout">
            <div class="auth-card">
                <div class="auth-tabs" role="tablist">
                    <button type="button" class="auth-tab active" data-tab="login" role="tab" aria-selected="true">
                        Đăng nhập
                    </button>
                    <button type="button" class="auth-tab" data-tab="register" role="tab" aria-selected="false">
                        Đăng ký
                    </button>
                </div>

                <p id="auth-message" class="auth-message" hidden></p>

                <form id="form-login" class="auth-form active" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" placeholder="Nhập email của bạn" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mật khẩu</label>
                        <div class="input-password">
                            <input type="password" id="login-password" name="password" placeholder="Nhập mật khẩu" required minlength="6">
                            <button type="button" class="toggle-password" data-target="login-password" aria-label="Hiện mật khẩu">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <label class="auth-check">
                        <input type="checkbox" id="login-remember">
                        Ghi nhớ đăng nhập
                    </label>
                    <button type="submit" class="auth-btn">ĐĂNG NHẬP</button>
                </form>

                <form id="form-register" class="auth-form" novalidate hidden>
                    <div class="form-group">
                        <label for="reg-name">Họ và tên</label>
                        <input type="text" id="reg-name" name="name" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-phone">Số điện thoại</label>
                        <input type="tel" id="reg-phone" name="phone" placeholder="09xxxxxxxx" required pattern="^0\d{9}$">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Mật khẩu</label>
                        <div class="input-password">
                            <input type="password" id="reg-password" name="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                            <button type="button" class="toggle-password" data-target="reg-password" aria-label="Hiện mật khẩu">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm">Xác nhận mật khẩu</label>
                        <div class="input-password">
                            <input type="password" id="reg-confirm" name="confirm" placeholder="Nhập lại mật khẩu" required minlength="6">
                            <button type="button" class="toggle-password" data-target="reg-confirm" aria-label="Hiện mật khẩu">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <label class="auth-check">
                        <input type="checkbox" id="reg-agree" required>
                        Tôi đồng ý với <a href="chinh_sach.html">điều khoản sử dụng</a>
                    </label>
                    <button type="submit" class="auth-btn">ĐĂNG KÝ</button>
                </form>
            </div>

            <aside class="auth-aside">
                <h2>Chào mừng đến Beauty</h2>
                <p>Đăng nhập để theo dõi đơn hàng, lưu sản phẩm yêu thích và nhận ưu đãi độc quyền.</p>
                <ul class="auth-benefits">
                    <li><i class="fa-solid fa-gift"></i> Ưu đãi thành viên mới</li>
                    <li><i class="fa-solid fa-truck"></i> Freeship đơn từ 299K</li>
                    <li><i class="fa-solid fa-heart"></i> Lưu danh sách yêu thích</li>
                    <li><i class="fa-solid fa-box"></i> Kiểm tra đơn hàng nhanh</li>
                </ul>
            </aside>
        </div>
    </section>

<div id="footer"></div>

    <script src="js/auth.js"></script>
    <script src="js/tai_khoan.js"></script>
    <script src="style.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        loadLayout();
    });
    </script>
</body>
</html>
