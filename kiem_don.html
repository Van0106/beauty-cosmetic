<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title> KIỂM TRA ĐƠN HÀNG </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="kiem_don.css">

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
</head>
<body>

    <div id="header"></div>

    <main class="order-page">
        
        <h1 class="order-title" style="text-align: center; color: #f292b1; font-weight: 700; margin-bottom: 40px; font-size: 32px;">
            Kiểm tra đơn hàng
        </h1>

        <div class="order-box" style="max-width: 600px; margin: 0 auto; padding: 30px; background: #ffffff; border-radius: 16px; border: 1px solid #fcdade; box-shadow: 0 8px 24px rgba(242, 146, 177, 0.12);">
            
            <div class="search-order" style="margin-bottom: 25px;">
                <label for="orderPhone" style="display: block; font-weight: 600; color: #333; margin-bottom: 10px; font-size: 15px;">
                    Nhập số điện thoại đặt hàng
                </label>
    
                <div class="search-group" style="display: flex; gap: 15px; align-items: center;">
                    <input type="tel" id="orderPhone" placeholder="Ví dụ: 0912345xxx" 
                            style="flex: 1; padding: 12px 20px; border: 1px solid #fcdade; border-radius: 8px !important; outline: none; background-color: #fff5f7; font-size: 14px; font-family: 'Montserrat', sans-serif;">
        
                    <button onclick="checkOrder()" class="btn-kiem-tra-chuan">
                         Kiểm tra
                    </button>
                </div>
            </div>

            <div class="order-result" id="orderResult" style="display:none; margin-top: 30px; padding: 25px; background-color: #fff5f7; border: 1px solid #fcdade; border-radius: 12px;">
    
    <!-- KHU VỰC CHỌN ĐƠN HÀNG -->
    <div id="order-list-area" style="margin-bottom: 25px;">
        <h3 style="color: #333; font-size: 16px; margin-bottom: 15px;">Chọn đơn hàng cần xem:</h3>
        <div id="list-container" style="display: flex; flex-direction: column; gap: 10px;">
            <!-- Các nút bấm đơn hàng sẽ được JS tự tạo ra ở đây -->
        </div>
    </div>

    <!-- KHU VỰC CHI TIẾT ĐƠN HÀNG (Sẽ bị ẩn cho đến khi người dùng bấm chọn đơn) -->
    <div id="detail-container" style="display: none; border-top: 1px solid #fcdade; padding-top: 20px;">
        <h3 style="color: #333; font-size: 18px; text-align: center; margin-bottom: 20px;">Trạng thái đơn hàng</h3>

                <div class="progress-container" style="display: flex; justify-content: space-between; position: relative; margin-bottom: 30px;">
                    <div class="progress-line" style="position: absolute; top: 15px; left: 8%; right: 8%; height: 2px; background: #dee2e6; z-index: 1;"></div>
                    
                    <div class="step" style="flex: 1; text-align: center; z-index: 2;">
                        <div class="circle">1</div>
                        <p style="font-size: 12px; margin: 5px 0 0; color: #6c757d;">Đã xác nhận</p>
                    </div>
                    <div class="step" style="flex: 1; text-align: center; z-index: 2;">
                        <div class="circle">2</div>
                        <p style="font-size: 12px; margin: 5px 0 0; color: #6c757d;">Đang chuẩn bị</p>
                    </div>
                    <div class="step" style="flex: 1; text-align: center; z-index: 2;">
                        <div class="circle">3</div>
                        <p style="font-size: 12px; margin: 5px 0 0; color: #6c757d;">Đang giao</p>
                    </div>
                    <div class="step" style="flex: 1; text-align: center; z-index: 2;">
                        <div class="circle">4</div>
                        <p style="font-size: 12px; margin: 5px 0 0; color: #6c757d;">Hoàn thành</p>
                    </div>
                </div>

                <div class="order-info-card" style="background: #ffffff; border-radius: 8px; padding: 15px; border: 1px solid #f8e1e5;">
                    <div class="info-row" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fff5f7;">
                        <span style="color: #666; font-weight: 500; font-size: 14px;">Mã đơn:</span>
                        <strong id="showCode" style="color: #333; font-weight: 600; font-size: 14px;"></strong>
                    </div>
                    <div class="info-row" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fff5f7;">
                        <span style="color: #666; font-weight: 500; font-size: 14px;">Ngày đặt:</span>
                        <span id="showDate" style="color: #333; font-weight: 600; font-size: 14px;"></span>
                    </div>
                    <div class="info-row" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fff5f7;">
                        <span style="color: #666; font-weight: 500; font-size: 14px;">Thanh toán:</span>
                        <span id="showPayment" style="color: #333; font-weight: 600; font-size: 14px;"></span>
                    </div>
                    <div class="info-row" style="display: flex; justify-content: space-between; padding: 10px 0;">
                        <span style="color: #666; font-weight: 500; font-size: 14px;">Tổng tiền:</span>
                        <strong id="showTotal" class="price" style="color: #f292b1; font-weight: 700; font-size: 16px;"></strong>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="kiem_don.js"></script>
    <script src="style.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadLayout());
    </script>
    

</body>
</html>
