<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: #fff; overflow: visible; }
        
    </style>
</head>
<body>

<header class="header">
    <div class="container header-top">
        <div class="logo">
            <a href="trang_chu.html" title="Trang chủ - Beauty Cosmetic Beauty" target="_parent">
                <img src="images/logo.jpg" alt="Beauty Cosmetic Beauty" class="logo-img">
            </a>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm..." onkeypress="if(event && event.key === 'Enter') executeSearch()" oninput="showSuggestions(this.value)" autocomplete="off">
            <button type="button" aria-label="Tìm kiếm" title="Tìm kiếm" onclick="executeSearch()">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            </button>
            <div id="search-suggestions" class="search-suggestions"></div>
        </div>

        <div class="header-icons">
            <a href="tai_khoan.html" class="header-icon-item" target="_parent">
                <i class="fa-regular fa-user"></i>
                <div class="icon-text">
                    <span class="text-top">Tài khoản</span>
                    <span class="text-bottom">Đăng nhập</span>
                </div>
            </a>
            
            <a href="yeu_thich.html" class="header-icon-item" target="_parent">
                <i class="fa-regular fa-heart"></i>
                <div class="icon-text">
                    <span class="text-top">Yêu thích</span>
                </div>
            </a>
            
            <a href="gio_hang.html" class="header-icon-item" target="_parent">
                <div class="cart-icon-wrapper">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="cart-count" style="display: none;">0</span>
                </div>
                <div class="icon-text">
                    <span class="text-top">Giỏ hàng</span>
                </div>
            </a>

            <a href="kiem_don.html" class="header-icon-item" target="_parent">
                <i class="fa-solid fa-box-open"></i>
                <div class="icon-text">
                    <span class="text-top">Kiểm tra</span>
                    <span class="text-bottom">đơn hàng</span>
                </div>
            </a>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container nav-menu">
            <a href="trang_chu.html" target="_parent">TRANG CHỦ</a>
            <a href="danh_muc.html" target="_parent">DANH MỤC</a>
            <a href="khuyen_mai.html" target="_parent">KHUYẾN MÃI</a>
            <a href="flash_sale.html" target="_parent">FLASH SALE</a>
            <a href="tin_tuc.html" target="_parent">TIN TỨC</a>
            <a href="lien_he.html" target="_parent">LIÊN HỆ</a>
        </div>
    </nav>
</header>

<script src="san_pham.js"></script>
<script>
function showSuggestions(query) {
    let suggestionsBox = document.getElementById("search-suggestions");
    if (!suggestionsBox) return;

    query = query.trim().toLowerCase();
    if (query === "") {
        suggestionsBox.style.display = "none";
        window.parent.postMessage({type: 'resizeHeader', height: 145}, '*');
        return;
    }

    if (typeof danhSachSanPham === 'undefined') return;

    let matches = danhSachSanPham.filter(sp => sp.ten.toLowerCase().includes(query));
    matches.sort((a, b) => {
        let aStart = a.ten.toLowerCase().startsWith(query);
        let bStart = b.ten.toLowerCase().startsWith(query);
        if (aStart && !bStart) return -1;
        if (!aStart && bStart) return 1;
        return 0;
    });
    
    if (matches.length === 0) {
        suggestionsBox.innerHTML = '<div style="padding: 10px 15px; color: #777; font-size: 14px;">Không tìm thấy sản phẩm</div>';
        suggestionsBox.style.display = "block";
        window.parent.postMessage({type: 'resizeHeader', height: 190}, '*');
        return;
    }

    matches = matches.slice(0, 5);
    
    suggestionsBox.innerHTML = "";
    matches.forEach(sp => {
        const giaMoi = sp.giaGoc * (100 - sp.phanTramGiam) / 100;
        const item = document.createElement("a");
        item.className = "search-suggestion-item";
        item.href = "chitietsanpham.html?id=" + sp.id;
        
        if (window.parent !== window) {
            item.target = "_parent";
        }
        
        item.innerHTML = `
            <img src="${sp.hinhAnh}" alt="">
            <div class="search-suggestion-info">
                <span class="search-suggestion-name">${sp.ten}</span>
                <span class="search-suggestion-price">${giaMoi.toLocaleString()}đ</span>
            </div>
        `;
        suggestionsBox.appendChild(item);
    });
    
    suggestionsBox.style.display = "block";
    // 145 (base) + 65 per item
    window.parent.postMessage({type: 'resizeHeader', height: 145 + (matches.length * 65) + 10}, '*');
}

document.addEventListener("click", function(e) {
    let suggestionsBox = document.getElementById("search-suggestions");
    let searchInput = document.getElementById("search-input");
    if (suggestionsBox && e.target !== searchInput && !suggestionsBox.contains(e.target)) {
        suggestionsBox.style.display = "none";
        window.parent.postMessage({type: 'resizeHeader', height: 145}, '*');
    }
});

function executeSearch() {
    let query = document.getElementById("search-input").value.trim();
    if (query !== "") {
        if (window.parent !== window) {
            window.parent.location.href = "danh_muc.html?search=" + encodeURIComponent(query);
        } else {
            window.location.href = "danh_muc.html?search=" + encodeURIComponent(query);
        }
    }
}
</script>
</body>
</html>
