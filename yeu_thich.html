<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title> YÊU THÍCH </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="yeu_thich.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
</head>
<body>

    <div id="header"></div>

<section class="products">
    <div class="container">
        <div class="section-title">
            <h2>SẢN PHẨM YÊU THÍCH CỦA BẠN </h2>
        </div>
        <div class="product-grid" id="favorite-list">
        </div>
        <div id="empty-message"
        style="text-align:center;padding:60px;color:#777;">
            Chưa có sản phẩm yêu thích 💔
        </div>
    </div>
</section>

    <div id="footer"></div> 


<script src="style.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => loadLayout());
</script>

<script>


let favorites =
JSON.parse(localStorage.getItem("favorites")) || [];


let favoriteList =
document.getElementById("favorite-list");


function renderFavorites(){
let emptyBox =
    document.getElementById("empty-message");


    if(favorites.length > 0){


        emptyBox.style.display = "none";
    }
     else{


        emptyBox.style.display = "block";
    }


    favoriteList.innerHTML = "";


    favorites.forEach((product,index)=>{


        favoriteList.innerHTML += `


        <div class="product-card">


            <a href="${product.link}"
            class="product-link">


                <img src="${product.image}" alt="">


                <h3>${product.name}</h3>


                <div class="price">


                    <span class="new-price">


                        ${product.price}


                    </span>


                </div>


            </a>


            <button onclick="removeFavorite(${index})">


                Xóa khỏi yêu thích


            </button>


        </div>


        `;
       
    });
}


function removeFavorite(index){


    favorites.splice(index,1);


    localStorage.setItem(
        "favorites",
        JSON.stringify(favorites)
    );


    renderFavorites();
}


renderFavorites();


</script>
</body>
</html>
